- type: entity
  name: chainsaw
  parent: BaseItem
  id: Chainsaw
  description: A very large chainsaw. Usually you use this for cutting down trees... usually.
  components:
  - type: Wieldable
    wieldSound: !type:SoundPathSpecifier
      path: /Audio/Weapons/chainsawwield.ogg
      params:
        volume: -3
  - type: Sharp
  - type: Sprite
    sprite: Objects/Weapons/Melee/chainsaw.rsi
    state: icon
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -135
    attackRate: 4
    damage:
      types:
        Slash: 2
        Blunt: 2
        Structural: 4
    soundHit:
      path: /Audio/Weapons/chainsaw.ogg
      params:
        volume: -3
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 4
        Structural: 4
  - type: Item
    size: Large
    shape:
    - 0,0,2,2
    sprite: Objects/Weapons/Melee/chainsaw.rsi
  - type: DisarmMalus
  - type: UseDelay
    delay: 1
# White-List components
  - type: Execution
# White-List components
  # WL-Changes: Getto-surg start
  - type: Tool
    qualities:
      - Sawing
  - type: SurgeryTool
    slotsToCheck: [INNERCLOTHING, OUTERCLOTHING]
    slotsDenialPopup: surgery-must-be-stripped
    downDenialPopup: surgery-must-be-down
    whitelist:
      tags: [OperatableClothing]
    successChance: 0.5
    woundChance: 0.1
    failPopups: SurgeryFailBase
    failDamage:
      types:
        Blunt: 15
        Slash: 20
    failWounds:
      - woundPrototype: WoundArterialBleeding
        woundDamages:
          types:
            Slash: 5
      - woundPrototype: WoundFracture
        woundDamages:
          types:
            Blunt: 10
    speedModifier: 3
  # WL-Changes: Getto-surg end
