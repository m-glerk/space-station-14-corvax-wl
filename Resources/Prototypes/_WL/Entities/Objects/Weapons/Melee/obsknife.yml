- type: entity
  name: blue shueld energy knife
  parent: [BaseMeleeWeaponEnergy, SelectableLock, BaseCentcommContraband]
  id: EnergyKnifeBlueShield
  description: A practical knife with hot plasma in an internal container. When turned on, it will quickly make a hole in the opponent.
  components:
  - type: ItemToggle
    soundActivate:
      path: /Audio/Weapons/ebladeon.ogg
      params:
        volume: -6
    soundDeactivate:
      path: /Audio/Weapons/ebladeoff.ogg
      params:
        volume: -6
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Weapons/ebladehum.ogg
      params:
        volume: -6
  - type: ItemToggleMeleeWeapon
    activatedSoundOnSwing:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        volume: -3
        variation: 0.250
    activatedDamage:
      types:
        Slash: 10
        Structural: 10
        Heat: 10
  - type: MeleeWeapon
    wideAnimationRotation: -145
    attackRate: 1.3
    damage:
      types:
        Slash: 12
        Structural: 10
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: ComponentToggler
    components:
    - type: Sharp
    - type: DisarmMalus
      malus: 0.4
    - type: Execution
      doAfterDuration: 4.0
  - type: Sprite
    sprite: _WL/Objects/Weapons/Melee/obsknife.rsi
    layers:
      - state: e_sword
      - state: e_sword_blade
        color: "#FFFFFF"
        visible: false
        shader: unshaded
        map: [ "blade" ]
  - type: Item
    size: Small
    sprite: _WL/Objects/Weapons/Melee/obsknife.rsi
  - type: PointLight
    enabled: false
    radius: 1.5
    energy: 2.7
    color: purple
    netsync: false
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Items/pen_click.ogg
      params:
        volume: -4
        maxDistance: 2
  - type: UseDelay
    delay: 1.5
  - type: ItemToggleRequiresLock #  TODO: FIX THIS VERB IS COOKED
    lockedPopup: null
  - type: Tag
    tags:
    - CombatKnife
    - Knife
  - type: Tool
    qualities:
      - Slicing
    useSound:
      path: /Audio/Items/Culinary/chop.ogg
