- type: entity
  name: Bonza
  parent: BaseItem
  id: WeaponRifleBonza
  description: It's a less common rifle that Lecter's, but it's just as deadly.
  components:
  - type: Sprite
    sprite: _WL/Objects/Weapons/Guns/Rifles/bonza.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _WL/Objects/Weapons/Guns/Rifles/bonza.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: Item
    size: Huge
    shape:
    - 0,0,3,2
  - type: Gun
    fireRate: 6
    minAngle: 31
    maxAngle: 42
    selectedMode: FullAuto
    availableModes:
      - FullAuto
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ltrifle.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifle
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRifle
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
            - CartridgeRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Appearance
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: StaticPrice
    price: 2000
  - type: EmitSoundOnPickup
    sound:
      collection: RiflesPickUp
  - type: EmitSoundOnDrop
    sound:
      collection: RiflesDrop
  - type: EmitSoundOnLand
    sound:
      collection: RiflesDrop
  - type: Execution
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -15
    maxAngle: -25
  #WL-Changes start
  - type: GunStandingRequired
  - type: MeleeWeapon
    wideAnimationRotation: 135
    damage:
      types:
        Blunt: 7
    angle: 55
    animation: WeaponArcThrust
    soundHit:
      collection: MetalThud
  - type: MeleeRequiresWield
  - type: AltFireMelee
    attackType: Heavy
