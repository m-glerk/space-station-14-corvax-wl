- type: entity
  parent: ClothingOuterStorageBase
  id: ClothingOuterVestHeavyDSS
  name: heavy body armor
  description: Bulletproof vest of the 5th class with an additional set of anti-shatter protection. It's quite heavy.
  components:
  - type: Sprite
    sprite: _WL/Clothing/OuterClothing/Vests/secheavy.rsi
  - type: Clothing
    sprite: _WL/Clothing/OuterClothing/Vests/secheavy.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.35
        Heat: 0.8
        Caustic: 0.9
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 0.9

- type: entity
  parent: ClothingOuterStorageBase
  id: ClothingOuterVestHeavyLoadersOveralls
  name: loader's overalls
  description: A jumpsuit that won't let you get your clothes dirty
  components:
  - type: Sprite
    sprite: _WL/Clothing/OuterClothing/Vests/loaders_overalls.rsi
  - type: Clothing
    sprite: _WL/Clothing/OuterClothing/Vests/loaders_overalls.rsi

- type: entity
  parent: ClothingOuterArmorBasic
  id: ClothingOuterVestBlueShield
  name: blue shield officer's vest
  description: A practical and, most importantly, comfortable bulletproof vest for the dust-free work of a bodyguard.
  components:
    - type: Sprite
      sprite: _WL/Clothing/OuterClothing/Vests/blueshield.rsi
    - type: Clothing
      sprite: _WL/Clothing/OuterClothing/Vests/blueshield.rsi
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.6
          Slash: 0.6
          Piercing: 0.35
          Heat: 0.7
