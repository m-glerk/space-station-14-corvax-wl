- type: reagent
  id: StrangeReagent
  name: reagent-name-strange
  group: Medicine
  desc: reagent-desc-strange
  flavor: mindful
  color: "#5e8d14"
  physicalDesc: reagent-physical-desc-strange
  worksOnTheDead: true
  metabolisms:
    Bloodstream:
      metabolismRate: 1
      effects:
      - !type:HealthChange
        damage:
          types:
            Cellular: 33
        conditions:
          - !type:MobStateCondition
              mobstate: Dead
      - !type:ModifyStatusEffect # Offbrand
        conditions:
          - !type:MobStateCondition
              mobstate: Dead
        effectProto: StatusEffectStrangeReagent
        time: 1
        type: Add
      - !type:ModifyHeartDamage
        amount: 100.0
        conditions:
          - !type:MobStateCondition
              mobstate: Dead
      - !type:ModifyLungDamage
        amount: 100.0
        conditions:
          - !type:MobStateCondition
              mobstate: Dead
      - !type:ModifyBrainDamage
        amount: -100.0
        conditions:
          - !type:MobStateCondition
              mobstate: Dead
      - !type:ModifyBrainOxygen
        amount: 10.0
        conditions:
          - !type:MobStateCondition
              mobstate: Dead
      - !type:ForceReturnToBody
