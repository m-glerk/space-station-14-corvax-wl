- type: reagent
  id: Stimulants
  name: reagent-name-stimulants
  group: Narcotics
  desc: reagent-desc-stimulants
  physicalDesc: reagent-physical-desc-energizing
  contrabandSeverity: Syndicate
  flavor: sharp
  color: "#9A040E"
  boilingPoint: 212.0
  meltingPoint: 170.0
  metabolisms:
    Bloodstream:
      statusEffects: # Offbrand
      - statusEffect: StatusEffectHeartStrainHyperzine
      metabolismRate: 1.0
      effects:
      # Main effects
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.25
        sprintSpeedModifier: 1.25
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Stimulants
          min: 80 #please wait 3 minutes before using another stimpack
        damage:
          types:
            Poison: 1
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: ChloralHydrate
          min: 1
        reagent: ChloralHydrate
        amount: -10
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStimulantsStamina # You are on meth. You keep going.
        time: 3
# WL species end
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 3.5
        type: Remove
      - !type:ModifyKnockdown
        time: 3.5
        type: Remove
      - !type:ModifyStatusEffect
        effectProto: StatusEffectForcedSleeping
        time: 3
        type: Remove
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 3
      # Side effects
      - !type:Jitter
      # OD
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Stimulants
          min: 45
        damage:
          types:
            Poison: 3
      # Interactions
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: Haloperidol
          max: 0.01
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: ChloralHydrate
          min: 1
        reagent: ChloralHydrate
        amount: -10
      # Main effects
      - !type:ModifyBleed
        amount: -1.5
      - !type:EvenHealthChange
        conditions:
        - !type:MobStateCondition
          mobstate: Critical
# WL species start
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
        damage: # Doesn't heal poison because if you OD'd I'm not giving you a safety net
          Burn: -0.5
          Brute: -0.5
      - !type:HealthChange
        conditions:
        - !type:MobStateCondition
          mobstate: Critical
# WL species start
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
        damage:
          types:
            Asphyxiation: -2
      # Side effects
      - !type:ResetNarcolepsy
      - !type:SatiateHunger
        factor: 1
      - !type:SatiateThirst
        factor: 1

