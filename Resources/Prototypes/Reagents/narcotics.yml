- type: reagent
  id: Desoxyephedrine
  name: reagent-name-desoxyephedrine
  group: Narcotics
  desc: reagent-desc-desoxyephedrine
  physicalDesc: reagent-physical-desc-translucent
  contrabandSeverity: Minor
  flavor: bitter
  color: "#FAFAFA"
  boilingPoint: 212.0  # Dexosyephedrine vape when?
  meltingPoint: 170.0
  metabolisms:
    Bloodstream:
      statusEffects: # Offbrand
      - statusEffect: StatusEffectHeartStrainDesoxyephedrine
      # Main effects
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.55
            Blunt: 1.1 # meant to be slightly more than tricordrazine heals
      # OD
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Desoxyephedrine
          min: 16
# WL species start
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
        damage:
          types:
            Poison: 3 # this is added to the base damage of the meth.
            Asphyxiation: 2
      # Main effects
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.20
        sprintSpeedModifier: 1.20
# WL species start
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
# WL species start
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 3
        type: Remove
# WL species start
        # Android
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      - !type:ModifyKnockdown
        time: 3
        type: Remove
# WL species start
        # Android
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      - !type:ModifyStatusEffect
        effectProto: StatusEffectDesoxyStamina # You are on meth. You keep going.
        time: 3
# WL species start
        # Android
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 3
# WL species start
        # Android
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      # Side effects
      - !type:Jitter
# WL species start
        # Android
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
# WL species start
        # Android
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      - !type:ModifyStatusEffect
        effectProto: StatusEffectPainNumbness
        time: 2
# WL species start
        # Android
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end
      # Interactions
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: Haloperidol
          max: 0.01
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove

      # Side effects
      - !type:ResetNarcolepsy
        conditions:
        - !type:ReagentCondition
          reagent: Desoxyephedrine
          min: 5
# WL species start
        - !type:MetabolizerTypeCondition
          type: [ Golem, Biorobotic ]
          inverted: true
# WL species end

