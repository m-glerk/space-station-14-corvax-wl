- type: entity
  id: EffectWeldingSparks
  categories: [ HideSpawnMenu ]
  components:
  # - type: WeldingSparksVisuals # WL-changes
  - type: Transform
    anchored: true
  - type: Sprite
    snapCardinals: true
    noRot: true
    drawdepth: Effects
    sprite: /Textures/_Goobstation/Effects/welding_effect.rsi
    layers:
    - state: smoke
    - state: welding_sparks
      shader: unshaded
  - type: AnimationPlayer
  - type: PointLight
    color: orange
    # WL-Changes-Start
    radius: 2.5
    energy: 1.5
    # WL-Changes-End
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: EffectWeldingSparks
  id: EffectWeldingSparksExp
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: smoke
    - state: exp_welding_sparks
      shader: unshaded
  # WL-Changes-Start
  - type: PointLight
    radius: 4.0
    energy: 2.0
    color: MediumAquamarine
  # WL-Changes-End
